name: Prettier Format

on:
  pull_request:

jobs:
  format:
    name: "Format"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Prettier Action
      uses: creyD/prettier_action@v4.6
      with:
        prettier_options: --write .
        only_changed: True
        git_identity: author